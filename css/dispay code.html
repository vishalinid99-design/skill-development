<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property Exercise</title>
    <style>
        /* Fixing the 'dispay' typo to 'display' */
        .a { display: inline; }
        .b { display: flex; gap: 10px; } /* Added gap for better visibility */
        .c { display: grid; }
        .d { display: block; }

        p {
            background-color: rgb(188, 214, 244);
            padding: 10px;
            margin: 10px 0;
        }

        span {
            background-color: rgb(212, 212, 226);
            padding: 10px;
            border: 1px solid #999;
        }
    </style>
</head>
<body>

    <h2>display inline</h2>
    <p class="a">
        <span>red</span>
        <span>black</span>
        <span>white</span>
    </p>

    <h2>display flex</h2>
    <p class="b">
        <span>tea</span>
        <span>coffee</span>
        <span>boost</span>
    </p>

    <h2>display grid</h2>
    <p class="c">
        <span>grid item 1</span>
        <span>grid item 2</span>
        <span>grid item 3</span>
    </p>

</body>
</html>
