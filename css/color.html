<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color and Text Practice</title>
    <style>
        /* This matches the CSS from your second screenshot */
        p {
            background-color: #ff5143; /* Bright reddish-orange */
            color: darkblue;           /* Navy text color */
            padding: 10px;             /* Adding space so text isn't cramped */
            margin: 10px 0;
        }

        /* Demonstrating text-align-last */
        .align-example {
            text-align: justify;
            text-align-last: center; 
            width: 300px;
            border: 1px dashed gray;
        }
    </style>
</head>
<body>

    <p>Standard color 140 in CSS</p>

    <p>text-align-last</p>

    <p>direction</p>

    <hr>
    <div class="align-example">
        This is a longer paragraph used to demonstrate how "text-align-last" works. 
        The last line of this block will be centered!
    </div>

</body>
</html>
