<!DOCTYPE html>
<html>
<head>
    <title>Fashion Store</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            cursor: pointer;
        }

        section {
            display: none;
            padding: 20px;
        }

        .active {
            display: block;
        }

        .hero {
            text-align: center;
            padding: 40px;
            background: lightgray;
        }

        .product-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .product-card {
            border: 1px solid #ddd;
            padding: 15px;
            width: 200px;
            text-align: center;
        }

        button {
            background: black;
            color: white;
            padding: 8px;
            cursor: pointer;
        }

        .contact {
            text-align: center;
        }

        input, textarea {
            margin: 10px;
            padding: 10px;
            width: 200px;
        }
    </style>
</head>

<body>

<header>
    <h1>Fashion Store</h1>
    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('men')">Men</a>
        <a onclick="showPage('women')">Women</a>
        <a onclick="showPage('cart')">Cart</a>
        <a onclick="showPage('contact')">Contact</a>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="active">
    <div class="hero">
        <h2>Welcome to Fashion Store</h2>
        <p>Latest trends at best prices</p>
    </div>
</section>

<!-- MEN -->
<section id="men">
    <h2>Men Collection</h2>
    <div class="product-container">
        <div class="product-card">
            <h3>Men Shirt</h3>
            <p>₹999</p>
            <button onclick="addToCart('Men Shirt',999)">Add</button>
        </div>

        <div class="product-card">
            <h3>Men Jeans</h3>
            <p>₹1499</p>
            <button onclick="addToCart('Men Jeans',1499)">Add</button>
        </div>
    </div>
</section>

<!-- WOMEN -->
<section id="women">
    <h2>Women Collection</h2>
    <div class="product-container">
        <div class="product-card">
            <h3>Dress</h3>
            <p>₹1199</p>
            <button onclick="addToCart('Dress',1199)">Add</button>
        </div>

        <div class="product-card">
            <h3>Top</h3>
            <p>₹699</p>
            <button onclick="addToCart('Top',699)">Add</button>
        </div>
    </div>
</section>

<!-- CART -->
<section id="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total"></h3>
</section>

<!-- CONTACT -->
<section id="contact">
    <h2>Contact Us</h2>
    <div class="contact">
        <input type="text" placeholder="Name"><br>
        <input type="email" placeholder="Email"><br>
        <textarea placeholder="Message"></textarea><br>
        <button>Send</button>
    </div>
</section>

<script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    function showPage(pageId) {
        document.querySelectorAll("section").forEach(sec => {
            sec.classList.remove("active");
        });
        document.getElementById(pageId).classList.add("active");

        if (pageId === "cart") displayCart();
    }

    function addToCart(name, price) {
        cart.push({name, price});
        localStorage.setItem("cart", JSON.stringify(cart));
        alert("Added to cart!");
    }

    function displayCart() {
        let container = document.getElementById("cart-items");
        let total = 0;

        container.innerHTML = "";

        cart.forEach(item => {
            container.innerHTML += `<p>${item.name} - ₹${item.price}</p>`;
            total += item.price;
        });

        document.getElementById("total").innerText = "Total: ₹" + total;
    }
</script>

</body>
</html>
