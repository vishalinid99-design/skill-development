/* Display Inline (Default for spans) */
.a span {
    display: inline;
    border: 1px solid red;
    margin: 5px;
}

/* Display Flex */
.b {
    display: flex;
    gap: 10px;
    background-color: #f0f0f0;
}

/* Display Grid */
.c {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}
