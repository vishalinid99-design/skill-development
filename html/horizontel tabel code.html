<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Table</title>
    <style>
        table, th, td {
            border: 1px double red;
            border-radius: 5px;
            width: 50%;
        }
    </style>
</head>
<body>

    <table>
        <tr style="height: 30px;">
            <th>Bike</th>
            <th>Car</th>
            <th>Bicycle</th>
        </tr>
        <tr>
            <td>KTM</td>
            <td>AUDI</td>
            <td>LADYBIRD</td>
        </tr>
    </table>

</body>
</html>
